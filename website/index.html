<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Suren Pastries — Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#0F0D0A;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;
}

/* ── BACKGROUND PARTICLES ── */
.bg{position:fixed;inset:0;overflow:hidden;z-index:0}
.particle{
  position:absolute;
  border-radius:50%;
  opacity:0;
  animation:float 6s ease-in-out infinite;
}
.p1{width:300px;height:300px;background:radial-gradient(circle,rgba(200,80,42,0.15),transparent 70%);top:-100px;right:-100px;animation-delay:0s}
.p2{width:200px;height:200px;background:radial-gradient(circle,rgba(212,168,83,0.12),transparent 70%);bottom:10%;left:5%;animation-delay:2s}
.p3{width:150px;height:150px;background:radial-gradient(circle,rgba(200,80,42,0.1),transparent 70%);top:40%;right:10%;animation-delay:4s}
@keyframes float{0%,100%{opacity:0;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-20px) scale(1.05)}}

/* ── MAIN LOADER ── */
.loader{
  position:relative;z-index:1;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:0;
}

/* Plate ring */
.plate-ring{
  position:relative;
  width:120px;height:120px;
  margin-bottom:32px;
}
.ring-outer{
  position:absolute;inset:0;
  border-radius:50%;
  border:1.5px solid rgba(212,168,83,0.3);
  animation:spin-slow 8s linear infinite;
}
.ring-outer::before{
  content:'';
  position:absolute;top:-3px;left:50%;
  transform:translateX(-50%);
  width:6px;height:6px;
  background:var(--gold,#D4A853);
  border-radius:50%;
}
.ring-inner{
  position:absolute;inset:12px;
  border-radius:50%;
  border:1px solid rgba(200,80,42,0.4);
  animation:spin-slow 5s linear infinite reverse;
}
.plate-center{
  position:absolute;inset:24px;
  border-radius:50%;
  background:rgba(200,80,42,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes spin-slow{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* Logo */
.logo-wrap{overflow:hidden;margin-bottom:8px;}
.logo{
  font-family:'Playfair Display',serif;
  font-size:42px;
  font-weight:700;
  color:#D4A853;
  letter-spacing:4px;
  animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s both;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

.tagline{
  font-size:12px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  font-weight:300;
  animation:fadeIn 0.8s ease 0.8s both;
  margin-bottom:48px;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Progress bar */
.progress-wrap{
  width:200px;
  position:relative;
}
.progress-track{
  height:1px;
  background:rgba(255,255,255,0.1);
  border-radius:1px;
  overflow:hidden;
  margin-bottom:16px;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#C8502A,#D4A853);
  border-radius:1px;
  width:0%;
  animation:load 2.8s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
}
@keyframes load{
  0%{width:0%}
  30%{width:35%}
  60%{width:65%}
  85%{width:88%}
  100%{width:100%}
}
.progress-label{
  font-size:11px;
  color:rgba(255,255,255,0.3);
  letter-spacing:2px;
  text-transform:uppercase;
  animation:fadeIn 0.5s ease 1s both;
}
.progress-pct{
  font-size:11px;
  color:rgba(212,168,83,0.7);
  font-weight:500;
  margin-top:4px;
}

/* Dots */
.dots{display:flex;gap:6px;justify-content:center;margin-top:32px;animation:fadeIn 0.5s ease 1.2s both;}
.dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(200,80,42,0.5);
  animation:blink 1.2s ease-in-out infinite;
}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* Fade out */
body.done .loader{animation:fadeOut 0.5s ease forwards}
@keyframes fadeOut{to{opacity:0;transform:scale(0.95)}}
</style>
</head>
<body>
<div class="bg">
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
</div>

<div class="loader">
  <div class="plate-ring">
    <div class="ring-outer"></div>
    <div class="ring-inner"></div>
    <div class="plate-center">🍽️</div>
  </div>
  <div class="logo-wrap"><div class="logo">SUREN PASTRIES</div></div>
  <div class="tagline">Fine dining experience</div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="progress-label">Preparing your experience</div>
    <div class="progress-pct" id="pct">0%</div>
  </div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<script>
  let p=0;
  const pct=document.getElementById('pct');
  const iv=setInterval(()=>{
    p=Math.min(p+Math.random()*4,100);
    pct.textContent=Math.floor(p)+'%';
    if(p>=100){clearInterval(iv);pct.textContent='100%';
      setTimeout(()=>{
        document.body.classList.add('done');
        setTimeout(()=>location.href='landing.html',500);
      },400);
    }
  },60);
</script>
</body>
</html>
