<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Suren Pastries — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#C8502A;--gold:#D4A853;--dark:#1A1A1A;--cream:#FAF7F2;--muted:#7A7570;--border:#E8E4DF;--surface:#fff}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark)}

nav{background:var(--dark);height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);letter-spacing:1.5px}
.nav-links{display:flex;gap:4px}
.nl{background:none;border:none;color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.nl:hover,.nl.active{color:#fff;background:rgba(255,255,255,0.1)}
.cart-btn{display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 18px;border-radius:7px;cursor:pointer;text-decoration:none;transition:all 0.2s}
.cart-btn:hover{background:#a83e1e}
.cbadge{background:var(--gold);color:var(--dark);font-size:11px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* MENU HEADER */
.menu-head{
  background:var(--dark);padding:32px;
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;
}
.mh-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.mh-title{font-family:'Playfair Display',serif;font-size:32px;color:#fff;margin-bottom:6px}
.mh-sub{font-size:13px;color:rgba(255,255,255,0.5)}
/* Search */
.search-box{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:10px 16px;
  min-width:240px;
}
.search-box input{
  background:none;border:none;outline:none;color:#fff;
  font-family:'DM Sans',sans-serif;font-size:14px;width:100%;
}
.search-box input::placeholder{color:rgba(255,255,255,0.35)}
.search-icon{font-size:16px;opacity:0.5}

/* TABS */
.tabs-bar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  display:flex;gap:0;overflow-x:auto;
  scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab{
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  padding:16px 20px;border:none;background:none;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;
  white-space:nowrap;transition:all 0.2s;
}
.tab:hover{color:var(--dark)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ITEMS GRID */
.items-area{padding:28px 32px}
.category-label{
  font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:12px;
}
.category-label::after{content:'';flex:1;height:1px;background:var(--border)}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:36px}

.item{
  background:var(--surface);border-radius:14px;
  border:1px solid var(--border);display:flex;gap:14px;
  padding:16px;transition:all 0.25s;cursor:pointer;
  align-items:flex-start;
}
.item:hover{box-shadow:0 8px 24px rgba(0,0,0,0.08);transform:translateY(-2px)}
.item-emoji{
  width:60px;height:60px;flex-shrink:0;
  background:#FFF8F0;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:30px;
}
.item-body{flex:1;min-width:0}
.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.item-name{font-weight:500;font-size:15px;line-height:1.3}
.item-tag{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#C45800;background:#FFF0E0;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.item-desc{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:12px}
.item-foot{display:flex;justify-content:space-between;align-items:center}
.price{font-weight:700;font-size:16px;color:var(--accent)}
.add-btn{background:var(--dark);color:#fff;border:none;font-size:12px;font-weight:500;padding:7px 16px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.add-btn:hover{background:var(--accent)}

/* No results */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:15px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:500;transition:transform 0.3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
/* ── SMOOTH TRANSITIONS ── */
body{opacity:0;animation:fadeInPage 0.4s ease-out forwards}
body.fade-out{animation:fadeOutPage 0.25s ease-in forwards}
@keyframes fadeInPage{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOutPage{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}
</style>
</head>
<body>

<nav>
  <a href="landing.html" class="logo" style="text-decoration:none;">SUREN PASTRIES</a>
  <div class="nav-links" style="align-items: center;">
    <a class="nl" href="landing.html">Home</a>
    <a class="nl active" href="menu.html">Menu</a>
    <a class="nl" href="details.html">About</a>
    <a href="cart.html" class="cart-btn" id="nav-cart" style="display:none; margin-left:8px;">🛒 Cart <div class="cbadge" id="ccount">0</div></a>
  </div>
</nav>

<div class="menu-head">
  <div class="mh-left">
    <div class="mh-eyebrow">What's cooking</div>
    <div class="mh-title">Our Menu</div>
    <div class="mh-sub">80+ freshly prepared dishes, crafted daily</div>
  </div>
  <div class="search-box">
    <div class="search-icon">🔍</div>
    <input type="text" id="search" placeholder="Search dishes..." oninput="renderItems()"/>
  </div>
</div>

<div class="tabs-bar" id="tabs"></div>
<div class="items-area" id="items-area"></div>

<div class="toast" id="toast"></div>

<script>
const menu={
  Starters:[
    {id:1,name:'Paneer Tikka',desc:'Chargrilled cottage cheese with spiced marinade and mint chutney',price:180,emoji:'🍢',tag:'Popular'},
    {id:2,name:'Veg Spring Rolls',desc:'Crispy golden rolls with seasoned vegetable filling',price:120,emoji:'🥢'},
    {id:3,name:'Chicken 65',desc:'Spicy deep-fried chicken bites, South Indian style',price:220,emoji:'🍗',tag:'Spicy'},
    {id:4,name:'Gobi Manchurian',desc:'Crispy cauliflower in Indo-Chinese sauce',price:150,emoji:'🥦'},
    {id:5,name:'Samosa Chaat',desc:'Flaky samosas topped with tangy chutneys and yogurt',price:110,emoji:'🫕'},
    {id:6,name:'Fish Fry',desc:'Coastal style marinated fish, pan seared',price:260,emoji:'🐟',tag:'Special'},
  ],
  Mains:[
    {id:7,name:'Butter Chicken',desc:'Rich tomato-cream gravy with tender chicken pieces',price:280,emoji:'🍛',tag:'Bestseller'},
    {id:8,name:'Dal Makhani',desc:'Slow-cooked black lentils in buttery tomato sauce',price:200,emoji:'🫘'},
    {id:9,name:'Biryani Dum',desc:'Fragrant basmati rice layered with whole spices',price:320,emoji:'🍚',tag:'Popular'},
    {id:10,name:'Palak Paneer',desc:'Creamed spinach with soft cottage cheese cubes',price:240,emoji:'🥬'},
    {id:11,name:'Chicken Curry',desc:'Traditional South Indian style coconut curry',price:270,emoji:'🍲'},
    {id:12,name:'Mutton Rogan Josh',desc:'Slow-braised mutton in Kashmiri aromatic sauce',price:380,emoji:'🥘',tag:'Chef\'s pick'},
    {id:13,name:'Chole Bhature',desc:'Spiced chickpeas with deep-fried fluffy bread',price:180,emoji:'🫕'},
    {id:14,name:'Mixed Veg Curry',desc:'Seasonal vegetables in rustic masala gravy',price:190,emoji:'🥗'},
  ],
  Breads:[
    {id:15,name:'Butter Naan',desc:'Leavened flatbread from the tandoor, brushed with butter',price:50,emoji:'🫓'},
    {id:16,name:'Garlic Roti',desc:'Whole wheat with roasted garlic butter',price:55,emoji:'🫓'},
    {id:17,name:'Paratha Basket',desc:'Assorted stuffed parathas, served 3 per basket',price:140,emoji:'🥙'},
    {id:18,name:'Puri',desc:'Puffed deep-fried wheat bread, 3 pieces',price:60,emoji:'🫓'},
    {id:19,name:'Lachha Paratha',desc:'Multi-layered flaky whole wheat flatbread',price:70,emoji:'🫓'},
  ],
  Desserts:[
    {id:20,name:'Gulab Jamun',desc:'Soft milk-solid dumplings soaked in rose syrup',price:90,emoji:'🍮',tag:'Classic'},
    {id:21,name:'Kulfi Falooda',desc:'Indian ice cream with vermicelli and rose syrup',price:130,emoji:'🍨',tag:'Special'},
    {id:22,name:'Rasgulla',desc:'Spongy cottage cheese balls in light sugar syrup',price:95,emoji:'🍡'},
    {id:23,name:'Kheer',desc:'Slow-cooked rice pudding with cardamom and nuts',price:100,emoji:'🍚'},
    {id:24,name:'Halwa',desc:'Semolina pudding with ghee, nuts and saffron',price:110,emoji:'🟡'},
  ],
  Drinks:[
    {id:25,name:'Mango Lassi',desc:'Thick yogurt blended with Alphonso mango pulp',price:95,emoji:'🥭'},
    {id:26,name:'Masala Chai',desc:'Spiced milk tea, freshly brewed to perfection',price:45,emoji:'☕'},
    {id:27,name:'Fresh Lime Soda',desc:'Sweet or salted, your choice, chilled',price:60,emoji:'🍋'},
    {id:28,name:'Buttermilk',desc:'Tempered with mustard, curry leaf and ginger',price:50,emoji:'🥛'},
    {id:29,name:'Rose Sharbat',desc:'Chilled rose drink with basil seeds',price:70,emoji:'🌹'},
    {id:30,name:'Fresh Juice',desc:'Seasonal fruit — ask server for today\'s options',price:80,emoji:'🧃'},
  ]
};
const cats=Object.keys(menu);
let active='All';
let cartCount=parseInt(localStorage.getItem('cartCount')||0);
const ccountEl=document.getElementById('ccount');
if(ccountEl) ccountEl.textContent=cartCount;

function renderTabs(){
  let allCount = cats.reduce((sum, c) => sum + menu[c].length, 0);
  let tabsHTML = `<button class="tab ${active==='All'?'active':''}" onclick="setActive('All')">All <span style="font-size:11px;opacity:0.6">(${allCount})</span></button>`;
  tabsHTML += cats.map(c=>`
    <button class="tab ${c===active?'active':''}" onclick="setActive('${c}')">${c} <span style="font-size:11px;opacity:0.6">(${menu[c].length})</span></button>
  `).join('');
  document.getElementById('tabs').innerHTML=tabsHTML;
}
function setActive(c){active=c;renderTabs();renderItems();}

function renderItems(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const area=document.getElementById('items-area');
  if(q){
    // Search across all categories
    const results=cats.flatMap(c=>menu[c].filter(i=>i.name.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q)));
    if(!results.length){area.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>No dishes found for "${q}"</p></div>`;return;}
    area.innerHTML=`<div class="category-label">Search results (${results.length})</div><div class="items-grid">${results.map(itemHTML).join('')}</div>`;
    return;
  }
  
  if (active === 'All') {
    let html = '';
    cats.forEach((c, idx) => {
      const items = menu[c];
      html += `<div class="category-label" ${idx>0?'style="margin-top:40px"':''}>${c} — ${items.length} dishes</div>`;
      html += `<div class="items-grid">${items.map(itemHTML).join('')}</div>`;
    });
    area.innerHTML = html;
  } else {
    const items=menu[active];
    area.innerHTML=`
      <div class="category-label">${active} — ${items.length} dishes</div>
      <div class="items-grid">${items.map(itemHTML).join('')}</div>
    `;
  }
}
function itemHTML(i){
  return`<div class="item">
    <div class="item-emoji">${i.emoji}</div>
    <div class="item-body">
      <div class="item-top">
        <div class="item-name">${i.name}</div>
        ${i.tag?`<div class="item-tag">${i.tag}</div>`:''}
      </div>
      <div class="item-desc">${i.desc}</div>
      <div class="item-foot">
        <div class="price">₹${i.price}</div>
        <button class="add-btn" onclick="addCart(event, ${i.id}, '${i.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}', ${i.price}, '${i.emoji}')">+ Add</button>
      </div>
    </div>
  </div>`;
}
function addCart(event, id, name, price, emoji){
  let cart = JSON.parse(localStorage.getItem('surenPastriesCart')) || [];
  let existing = cart.find(i=>i.id===id);
  if(existing) { existing.qty++; }
  else { cart.push({id:id, name:name, price:price, qty:1, emoji:emoji}); }
  localStorage.setItem('surenPastriesCart', JSON.stringify(cart));
  cartCount = cart.reduce((s,i)=>s+i.qty, 0);
  localStorage.setItem('cartCount', cartCount);
  const cc = document.getElementById('ccount');
  if(cc) cc.textContent=cartCount;
  
  const t=document.getElementById('toast');
  if(t) {
    t.textContent='Added '+name+' · ₹'+price;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
  }
  
  if(event && event.currentTarget) {
    const btn = event.currentTarget;
    const oldText = btn.textContent;
    btn.textContent = '✓ Added';
    btn.style.background = '#4CAF50';
    btn.style.borderColor = '#4CAF50';
    btn.style.color = '#fff';
    setTimeout(()=>{
      btn.textContent = oldText;
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  }
  if(typeof updateFC==='function') updateFC();
}
renderTabs();renderItems();
</script>
<script>
function updateFC(){
  let c=parseInt(localStorage.getItem('cartCount')||0);
  const fc=document.getElementById('nav-cart'),fb=document.getElementById('ccount');
  if(fc&&fb){if(c>0){fc.style.display='flex';fb.textContent=c;}else{fc.style.display='none';}}
}
updateFC();
</script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('a').forEach(a=>{
    const h=a.getAttribute('href');
    if(h&&h.endsWith('.html')&&a.target!=='_blank'){
      a.addEventListener('click',e=>{
        e.preventDefault();
        document.body.classList.add('fade-out');
        setTimeout(()=>window.location.href=h,250);
      });
    }
  });
});
window.addEventListener('pageshow',e=>{if(e.persisted)document.body.classList.remove('fade-out');});
</script>
</body>
</html>
